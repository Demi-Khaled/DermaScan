name: dermascann_ai
description: AI-assisted skin lesion tracking and risk analysis app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  camera: ^0.10.5+9
  image_picker: ^1.2.1
  http: ^1.2.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.5.5
  google_sign_in: ^7.2.0
  flutter_secure_storage: ^10.0.0
  pdf: ^3.12.0
  printing: ^5.14.3
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.1.1
  share_plus: ^10.1.3
  path_provider: ^2.1.5
  flutter_timezone: ^5.0.2
  path: ^1.9.0
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
